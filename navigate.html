<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nav véhicule MBF</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #1DB954;
    --fg: #ffffff;
    --pill-bg: rgba(0,0,0,0.2);
    --btn-bg: rgba(0,0,0,0.18);
    --btn-hover: rgba(0,0,0,0.32);
  }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: -apple-system, 'SF Pro Display', 'League Spartan', sans-serif;
    color: var(--fg);
    user-select: none;
  }

  #bg-gradient {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.18) 0%, transparent 65%),
                var(--bg);
    transition: background-color 0.6s ease;
    z-index: 0;
  }

  #pulse-ring {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    animation: pulseRing 2s ease-out infinite;
    pointer-events: none;
  }
  #pulse-ring::before {
    content: '';
    position: absolute; inset: -30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    animation: pulseRing 2s ease-out infinite 0.4s;
  }
  @keyframes pulseRing {
    0% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.6; }
    60% { opacity: 0.2; }
    100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
  }

  #wrapper {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100%; width: 100%;
    padding: env(safe-area-inset-top, 16px) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 16px) env(safe-area-inset-left, 0);
  }

  #header {
    padding: 18px 24px 0;
    flex-shrink: 0;
  }
  #finding-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.75;
  }
  #vehicle-name {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.15;
    margin-top: 2px;
  }
  #line-badge {
    display: inline-block;
    margin-top: 6px;
    padding: 3px 11px;
    border-radius: 20px;
    background: rgba(0,0,0,0.22);
    font-size: 13px;
    font-weight: 600;
  }

  #arrow-zone {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  #dot {
    position: absolute;
    top: 18%;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.35);
    transition: top 0.6s ease;
  }

  #arrow-wrapper {
    display: flex; align-items: center; justify-content: center;
    width: 180px; height: 180px;
    transition: transform 0.4s cubic-bezier(0.25, 1.5, 0.5, 1);
    will-change: transform;
    filter: drop-shadow(0 6px 24px rgba(0,0,0,0.25));
  }

  #arrow-svg {
    width: 140px; height: 140px;
  }

  #arrived-icon {
    display: none;
    width: 90px; height: 90px;
    background: white;
    border-radius: 50%;
    align-items: center; justify-content: center;
    box-shadow: 0 0 0 18px rgba(255,255,255,0.18);
    animation: arrivedPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes arrivedPop {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  #arrived-icon svg { width: 48px; height: 48px; }

  #distance-block {
    padding: 0 28px 12px;
    flex-shrink: 0;
  }
  #distance-value {
    font-size: 64px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -2px;
    display: flex; align-items: baseline; gap: 6px;
  }
  #distance-unit {
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0;
    opacity: 0.85;
  }
  #distance-label {
    font-size: 28px;
    font-weight: 400;
    opacity: 0.9;
    margin-top: 2px;
  }

  #status-pill {
    display: inline-flex; align-items: center; gap: 7px;
    margin-top: 10px;
    padding: 6px 14px;
    border-radius: 20px;
    background: rgba(0,0,0,0.2);
    font-size: 13px;
    font-weight: 500;
  }
  .pill-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #7fff7f;
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #buttons {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 28px 20px;
    flex-shrink: 0;
  }

  .nav-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(0,0,0,0.18);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s;
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
  }
  .nav-btn:active { transform: scale(0.92); background: rgba(0,0,0,0.3); }
  .nav-btn svg { width: 22px; height: 22px; stroke: white; fill: none; }

  #accuracy-bar {
    padding: 0 28px 8px;
    flex-shrink: 0;
    display: flex; align-items: center; gap: 10px;
  }
  #accuracy-label { font-size: 12px; opacity: 0.6; }
  #accuracy-track {
    flex: 1; height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px; overflow: hidden;
  }
  #accuracy-fill {
    height: 100%; background: white;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  #arrived-overlay {
    display: none; position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 16px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  #arrived-overlay .big-check {
    width: 80px; height: 80px;
    background: white; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    animation: arrivedPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  #arrived-overlay p { font-size: 22px; font-weight: 700; color: white; }
  #arrived-overlay small { font-size: 14px; opacity: 0.7; color: white; }
  #arrived-dismiss {
    margin-top: 12px;
    padding: 12px 32px; border-radius: 30px;
    background: white; color: #333;
    font-size: 16px; font-weight: 600;
    border: none; cursor: pointer;
  }

  #gps-error {
    display: none;
    position: fixed; inset: 0; z-index: 60;
    background: #1a1a1a;
    flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    color: white; text-align: center; padding: 24px;
  }
  #gps-error svg { width: 56px; height: 56px; stroke: #ff453a; }
  #gps-error p { font-size: 16px; font-weight: 600; }
  #gps-error small { font-size: 13px; opacity: 0.6; }
  #gps-retry {
    margin-top: 16px; padding: 12px 28px;
    border-radius: 24px; background: white; color: #1a1a1a;
    font-size: 15px; font-weight: 600; border: none; cursor: pointer;
  }
</style>
</head>
<body>

<div id="bg-gradient"></div>

<div id="wrapper">
  <div id="header">
    <div id="finding-label">LOCALISATION</div>
    <div id="vehicle-name">Véhicule</div>
    <div id="line-badge">Ligne —</div>
  </div>

  <div id="arrow-zone">
    <div id="pulse-ring"></div>
    <div id="dot"></div>
    <div id="arrow-wrapper">
      <svg id="arrow-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path id="arrow-path"
          d="M50 8 L82 72 L50 56 L18 72 Z"
          fill="white"
          stroke="none"
          style="filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25))"
        />
      </svg>
      <div id="arrived-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1DB954" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
    </div>
  </div>

  <div id="accuracy-bar">
    <span id="accuracy-label">Précision GPS</span>
    <div id="accuracy-track"><div id="accuracy-fill" style="width:0%"></div></div>
    <span id="accuracy-value" style="font-size:12px;opacity:0.6;min-width:36px;text-align:right;">—</span>
  </div>

  <div id="distance-block">
    <div id="distance-value">
      <span id="dist-num">—</span>
      <span id="distance-unit">m</span>
    </div>
    <div id="distance-label">devant vous</div>
    <div id="status-pill">
      <div class="pill-dot"></div>
      <span id="status-text">Calcul en cours…</span>
    </div>
  </div>

  <div id="buttons">
    <button class="nav-btn" id="btn-close" title="Fermer">
      <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <button class="nav-btn" id="btn-sound" title="Son">
      <svg id="sound-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
    </button>
  </div>
</div>

<div id="arrived-overlay">
  <div class="big-check">
    <svg viewBox="0 0 24 24" fill="none" stroke="#1DB954" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:42px;height:42px">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <p>Vous y êtes !</p>
  <small id="arrived-vehicle-name">Véhicule trouvé</small>
  <button id="arrived-dismiss">Fermer</button>
</div>

<div id="gps-error">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round">
    <path d="M12 2a10 10 0 1 0 10 10"/>
    <line x1="12" y1="8" x2="12" y2="12"/>
    <circle cx="12" cy="16" r="0.5" fill="#ff453a"/>
  </svg>
  <p>GPS indisponible</p>
  <small>Vérifiez vos permissions de localisation</small>
  <button id="gps-retry">Réessayer</button>
</div>

<script>
const state = {
  vehicleLat: null,
  vehicleLon: null,
  userLat: null,
  userLon: null,
  userBearing: null,   // degrees from north, 0–360
  lineName: '',
  lineColor: '#1DB954',
  vehicleLabel: '',
  soundEnabled: true,
  arrived: false,
  watchId: null,
  lastDistance: null,
  lastBeepDistance: null,
  compassAvailable: false,
};

const bgGradient    = document.getElementById('bg-gradient');
const arrowWrapper  = document.getElementById('arrow-wrapper');
const arrowSvg      = document.getElementById('arrow-svg');
const arrivedIcon   = document.getElementById('arrived-icon');
const dot           = document.getElementById('dot');
const distNum       = document.getElementById('dist-num');
const distUnit      = document.getElementById('distance-unit');
const distLabel     = document.getElementById('distance-label');
const statusText    = document.getElementById('status-text');
const accuracyFill  = document.getElementById('accuracy-fill');
const accuracyValue = document.getElementById('accuracy-value');
const vehicleName   = document.getElementById('vehicle-name');
const lineBadge     = document.getElementById('line-badge');
const arrivedOverlay = document.getElementById('arrived-overlay');
const arrivedVehicleName = document.getElementById('arrived-vehicle-name');
const gpsError      = document.getElementById('gps-error');

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function haversineDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000; // metres
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function bearingTo(lat1, lon1, lat2, lon2) {
  const dLon = toRad(lon2 - lon1);
  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2))
           - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function formatDistance(m) {
  if (m >= 1000) return { num: (m/1000).toFixed(1), unit: 'km' };
  return { num: Math.round(m), unit: 'm' };
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}

function luminance(hex) {
  const { r, g, b } = hexToRgb(hex || '#1DB954');
  const norm = [r,g,b].map(c => { const v=c/255; return v<=0.03928?v/12.92:((v+0.055)/1.055)**2.4; });
  return 0.2126*norm[0]+0.7152*norm[1]+0.0722*norm[2];
}

// ─────────────────────────────────────────────
// SOUNDS
// ─────────────────────────────────────────────
const SOUNDS = {
  close:   '../soundsUX/MBF_SelectedVehicle_DoorClose.wav',
  open:    '../soundsUX/MBF_SelectedVehicle_DoorOpen.wav',
  arrive:  '../soundsUX/MBF_Success.wav',
  beep50:  '../soundsUX/MBF_NotificationInfo.wav',
  beep20:  '../soundsUX/MBF_Popup.wav',
  error:   '../soundsUX/MBF_NotificationError.wav',
};

function playSound(key) {
  if (!state.soundEnabled) return;
  try {
    const a = new Audio(SOUNDS[key]);
    a.volume = 0.85;
    a.play().catch(()=>{});
  } catch(e) {}
}

// ─────────────────────────────────────────────
// HAPTICS
// ─────────────────────────────────────────────
function vibrate(pattern) {
  try { navigator.vibrate && navigator.vibrate(pattern); } catch(e) {}
}

// ─────────────────────────────────────────────
// THEMING
// ─────────────────────────────────────────────
function applyTheme(hexColor) {
  if (!hexColor || hexColor === '#ffffff' || hexColor === '#FFFFFF') hexColor = '#1DB954';
  state.lineColor = hexColor;

  // Darken slightly for richer bg
  const { r, g, b } = hexToRgb(hexColor);
  const darken = (v) => Math.max(0, Math.floor(v * 0.82));
  const dark = `rgb(${darken(r)},${darken(g)},${darken(b)})`;
  bgGradient.style.background = `radial-gradient(ellipse at 50% 25%, rgba(255,255,255,0.2) 0%, transparent 65%), ${hexColor}`;
  document.documentElement.style.setProperty('--bg', hexColor);

  const isLight = luminance(hexColor) > 0.4;
  document.documentElement.style.setProperty('--fg', isLight ? '#1a1a1a' : '#ffffff');
  arrivedIcon.querySelector('svg').style.stroke = hexColor;
  arrivedOverlay.querySelector('.big-check svg').style.stroke = hexColor;

  lineBadge.style.background = 'rgba(0,0,0,0.22)';
}

// ─────────────────────────────────────────────
// ARROW UPDATE
// ─────────────────────────────────────────────
let currentArrowAngle = 0;
let targetArrowAngle  = 0;
let animRafId = null;

function animateArrow() {
  let diff = targetArrowAngle - currentArrowAngle;
  // Wrap shortest path
  while (diff >  180) diff -= 360;
  while (diff < -180) diff += 360;

  if (Math.abs(diff) > 0.3) {
    currentArrowAngle += diff * 0.12;
    arrowWrapper.style.transform = `rotate(${currentArrowAngle}deg)`;
    animRafId = requestAnimationFrame(animateArrow);
  } else {
    currentArrowAngle = targetArrowAngle;
    arrowWrapper.style.transform = `rotate(${currentArrowAngle}deg)`;
  }
}

function setArrowAngle(angleDeg) {
  targetArrowAngle = angleDeg;
  if (animRafId) cancelAnimationFrame(animRafId);
  animRafId = requestAnimationFrame(animateArrow);
}

// ─────────────────────────────────────────────
// DOT POSITION (represents how far the vehicle is : closer = lower)
// ─────────────────────────────────────────────
function updateDot(distanceM) {
  // Range: 500m → top 12%, 0m → top 50%
  const clamp = Math.min(Math.max(distanceM, 0), 500);
  const pct   = 12 + (1 - clamp/500) * 38;
  dot.style.top = pct + '%';
}

// ─────────────────────────────────────────────
// MAIN UPDATE
// ─────────────────────────────────────────────
function update() {
  const { vehicleLat, vehicleLon, userLat, userLon, userBearing } = state;
  if (vehicleLat == null || userLat == null) return;

  const dist = haversineDistance(userLat, userLon, vehicleLat, vehicleLon);
  const bearingToVehicle = bearingTo(userLat, userLon, vehicleLat, vehicleLon);

  // Arrow = bearing to vehicle minus user's heading (so arrow is relative to user)
  const relAngle = userBearing != null
    ? ((bearingToVehicle - userBearing + 360) % 360)
    : bearingToVehicle;

  const { num, unit } = formatDistance(dist);
  distNum.textContent = num;
  distUnit.textContent = unit;

  updateDot(dist);

  if (dist < 15 && !state.arrived) {
    triggerArrived();
    return;
  }

  if (relAngle > 337.5 || relAngle <= 22.5)       distLabel.textContent = 'devant vous';
  else if (relAngle <= 67.5)                        distLabel.textContent = 'avant droite';
  else if (relAngle <= 112.5)                       distLabel.textContent = 'à droite';
  else if (relAngle <= 157.5)                       distLabel.textContent = 'arrière droite';
  else if (relAngle <= 202.5)                       distLabel.textContent = 'derrière vous';
  else if (relAngle <= 247.5)                       distLabel.textContent = 'arrière gauche';
  else if (relAngle <= 292.5)                       distLabel.textContent = 'à gauche';
  else                                               distLabel.textContent = 'avant gauche';

  setArrowAngle(relAngle);

  if (dist < 50)       statusText.textContent = 'Très proche !';
  else if (dist < 150) statusText.textContent = 'Vous approchez…';
  else if (dist < 400) statusText.textContent = 'Continuez tout droit';
  else                 statusText.textContent = 'Suivez la direction';

  if (state.lastBeepDistance == null || Math.abs(state.lastBeepDistance - dist) > 10) {
    if (dist < 20 && (state.lastBeepDistance == null || state.lastBeepDistance >= 20)) {
      playSound('beep20'); vibrate([80, 40, 80]);
    } else if (dist < 50 && (state.lastBeepDistance == null || state.lastBeepDistance >= 50)) {
      playSound('beep50'); vibrate([40]);
    }
    state.lastBeepDistance = dist;
  }

  state.lastDistance = dist;
}

// ─────────────────────────────────────────────
// ARRIVED
// ─────────────────────────────────────────────
function triggerArrived() {
  if (state.arrived) return;
  state.arrived = true;

  arrowSvg.style.display = 'none';
  arrivedIcon.style.display = 'flex';

  distLabel.textContent = 'vous êtes arrivé(e) !';
  statusText.textContent = 'Véhicule trouvé 🎉';
  distNum.textContent = '0';
  distUnit.textContent = 'm';

  arrivedVehicleName.textContent = `${state.vehicleLabel}  •  Ligne ${state.lineName}`;
  arrivedOverlay.style.display = 'flex';

  playSound('arrive');
  vibrate([100, 50, 100, 50, 200]);
}

// ─────────────────────────────────────────────
// GPS WATCH
// ─────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) { showGPSError(); return; }

  state.watchId = navigator.geolocation.watchPosition(
    pos => {
      state.userLat     = pos.coords.latitude;
      state.userLon     = pos.coords.longitude;
      if (pos.coords.heading != null && !isNaN(pos.coords.heading)) {
        state.userBearing = pos.coords.heading;
      }

      // accuracy bar : 100% = 5m, 0% = 100m
      const acc = pos.coords.accuracy;
      const pct = Math.max(0, Math.min(100, Math.round((1 - (acc-5)/95) * 100)));
      accuracyFill.style.width = pct + '%';
      accuracyValue.textContent = Math.round(acc) + 'm';

      gpsError.style.display = 'none';
      update();
    },
    err => {
      console.warn('GPS error', err);
      showGPSError();
      playSound('error');
    },
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
  );

  // Device orientation for bearing (when available)
  if (typeof DeviceOrientationEvent !== 'undefined') {
    // iOS 13+ needs permission
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(r => {
        if (r === 'granted') listenOrientation();
      }).catch(() => {});
    } else {
      listenOrientation();
    }
  }
}

function listenOrientation() {
  window.addEventListener('deviceorientationabsolute', handleOrientation, true);
  window.addEventListener('deviceorientation', handleOrientation, true);
  state.compassAvailable = true;
}

let lastOrientationUpdate = 0;
function handleOrientation(e) {
  const now = Date.now();
  if (now - lastOrientationUpdate < 100) return; // throttle to 10fps
  lastOrientationUpdate = now;

  let heading = null;
  if (e.absolute && e.alpha != null) {
    heading = (360 - e.alpha + 360) % 360;
  } else if (e.webkitCompassHeading != null) {
    heading = e.webkitCompassHeading;
  } else if (e.alpha != null) {
    heading = (360 - e.alpha + 360) % 360;
  }

  if (heading != null) {
    state.userBearing = heading;
    update();
  }
}

function showGPSError() {
  gpsError.style.display = 'flex';
}

// ─────────────────────────────────────────────
// MESSAGE FROM PARENT
// ─────────────────────────────────────────────
window.addEventListener('message', e => {
  const d = e.data;
  if (!d || typeof d !== 'object') return;

  if (d.type === 'vehicleNav') {
    state.vehicleLat   = d.lat;
    state.vehicleLon   = d.lon;
    state.lineName     = d.lineName  || '';
    state.vehicleLabel = d.vehicleLabel || '';

    vehicleName.textContent = `Bus ${d.vehicleLabel || ''}`;
    lineBadge.textContent   = `Ligne ${d.lineName || '—'}`;

    if (d.lineColor) applyTheme(d.lineColor);

    // reset arrived if vehicle has moved
    if (state.arrived && state.lastDistance > 20) {
      state.arrived = false;
      arrowSvg.style.display = '';
      arrivedIcon.style.display = 'none';
      arrivedOverlay.style.display = 'none';
    }

    update();
  }

  if (d.type === 'vehicleNavUpdate') {
    state.vehicleLat = d.lat;
    state.vehicleLon = d.lon;
    update();
  }
});

// ─────────────────────────────────────────────
// BUTTONS
// ─────────────────────────────────────────────
document.getElementById('btn-close').addEventListener('click', () => {
  playSound('close');
  vibrate([30]);
  if (state.watchId) navigator.geolocation.clearWatch(state.watchId);
  window.parent?.postMessage({ type: 'closeNav' }, '*');
  window.close();
  setTimeout(() => history.back(), 200);
});

let soundMuted = false;
document.getElementById('btn-sound').addEventListener('click', () => {
  soundMuted = !soundMuted;
  state.soundEnabled = !soundMuted;
  const icon = document.getElementById('sound-icon');
  vibrate([20]);
  if (soundMuted) {
    icon.innerHTML = `
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>`;
    icon.style.opacity = '0.5';
  } else {
    icon.innerHTML = `
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>`;
    icon.style.opacity = '1';
    playSound('open');
  }
});

document.getElementById('arrived-dismiss').addEventListener('click', () => {
  arrivedOverlay.style.display = 'none';
  playSound('close');
  vibrate([30]);
  window.parent?.postMessage({ type: 'closeNav' }, '*');
});

document.getElementById('gps-retry').addEventListener('click', () => {
  gpsError.style.display = 'none';
  if (state.watchId) navigator.geolocation.clearWatch(state.watchId);
  startGPS();
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
window.addEventListener('load', () => {
  playSound('open');
  startGPS();

  // Check if opened with URL params (direct open)
  const params = new URLSearchParams(window.location.search);
  if (params.get('lat') && params.get('lon')) {
    state.vehicleLat   = parseFloat(params.get('lat'));
    state.vehicleLon   = parseFloat(params.get('lon'));
    state.lineName     = params.get('lineName') || '';
    state.vehicleLabel = params.get('vehicleLabel') || '';
    const color        = params.get('lineColor');

    vehicleName.textContent = `Bus ${state.vehicleLabel}`;
    lineBadge.textContent   = `Ligne ${state.lineName || '—'}`;
    if (color) applyTheme(decodeURIComponent(color));
  }
});
</script>
</body>
</html>
